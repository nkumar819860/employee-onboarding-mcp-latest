# Employee Onboarding Agent Network Configuration
# Comprehensive agent network for employee onboarding process orchestration
# Uses Groq for LLM and integrates with employee-onboarding-agent-broker MCP server

name: employee-onboarding-agent-network
version: "2.0.0"
description: "Comprehensive agent network for employee onboarding with Groq LLM and MCP server orchestration"

# LLM Configuration - Using Groq with multiple models
llm:
  primary:
    provider: groq
    model: llama3-8b-8192
    api_key: "${GROQ_API_KEY}"
    base_url: "https://api.groq.com/openai/v1"
    temperature: 0.7
    max_tokens: 4096
    timeout: 30s
    fallback_models:
      - llama3-70b-8192  # For complex reasoning
      - mixtral-8x7b-32768  # For technical tasks
  
  # Secondary LLM for specialized tasks
  secondary:
    provider: groq
    model: llama3-70b-8192
    api_key: "${GROQ_API_KEY}"
    base_url: "https://api.groq.com/openai/v1"
    temperature: 0.3  # Lower temperature for precise tasks
    max_tokens: 8192
    timeout: 45

# Enhanced Agent Network Configuration
agents:
  # Master Orchestrator Agent with Enhanced Capabilities
  - name: onboarding-master-orchestrator
    description: "Master orchestrator that coordinates the complete employee onboarding process using the MCP broker"
    type: master_orchestrator
    llm_config: primary
    capabilities:
      - complete_employee_onboarding
      - process_management
      - error_handling_and_recovery
      - status_tracking_and_reporting
      - nlp_query_processing
      - workflow_optimization
      - compliance_validation
    tools:
      - orchestrate-employee-onboarding
      - get-onboarding-status
      - retry-failed-step
      - check-system-health
    mcp_servers:
      - employee-onboarding-agent-broker
    skills:
      - "Orchestrate complete employee onboarding from profile creation to asset allocation"
      - "Handle natural language queries about onboarding status and processes"
      - "Implement intelligent error recovery and retry mechanisms for failed steps"
      - "Provide real-time status updates and comprehensive progress tracking"
      - "Coordinate between multiple MCP services seamlessly"
      - "Ensure compliance with company policies and regulatory requirements"
      - "Generate detailed analytics and reports on onboarding processes"
    context_memory: 10000
    reasoning_depth: advanced
    
  # Employee Data Specialist Agent
  - name: employee-data-specialist
    description: "Specialized agent for employee profile management and data validation"
    type: specialist
    llm_config: secondary
    capabilities:
      - employee_profile_creation
      - data_validation_and_sanitization
      - compliance_checking
      - document_management
      - personal_data_security
    skills:
      - "Create and validate comprehensive employee profiles"
      - "Ensure data compliance with GDPR, CCPA, and company policies"
      - "Handle sensitive personal information securely"
      - "Validate employee data across multiple sources and systems"
      - "Generate compliance reports and maintain audit trails"
    security_level: high
    data_classification: sensitive
    
  # Asset Management Specialist Agent  
  - name: intelligent-asset-allocator
    description: "AI-powered asset allocation with optimization and tracking"
    type: specialist
    llm_config: primary
    capabilities:
      - intelligent_asset_allocation
      - inventory_optimization
      - cost_optimization
      - asset_lifecycle_management
      - vendor_coordination
    skills:
      - "Intelligently allocate assets based on role, department, and usage patterns"
      - "Optimize inventory levels and asset utilization"
      - "Coordinate with vendors for asset procurement and maintenance"
      - "Implement cost-effective asset allocation strategies"
      - "Track asset lifecycle and predict replacement needs"
      - "Ensure asset compliance with security and regulatory requirements"
    learning_enabled: true

  # Communication Manager Agent
  - name: intelligent-communication-manager
    description: "Advanced notification system with personalization and multi-channel support"
    type: specialist
    llm_config: primary
    capabilities:
      - personalized_communications
      - multi_channel_notifications
      - template_personalization
      - delivery_optimization
      - response_tracking
      - escalation_management
    skills:
      - "Generate personalized communications based on employee profile and preferences"
      - "Optimize notification timing and channels for maximum engagement"
      - "Track communication effectiveness and response rates"
      - "Implement intelligent escalation for unresponsive communications"
      - "Support multi-language communications for global workforce"
      - "Ensure accessibility compliance in all communications"
    personalization_engine: advanced
    channels:
      - email
      - sms
      - slack
      - teams
      - mobile_push

  # NLP Query Processing Agent
  - name: nlp-query-processor
    description: "Natural language processing for conversational onboarding support"
    type: specialist
    llm_config: primary
    capabilities:
      - natural_language_understanding
      - query_intent_recognition
      - context_aware_responses
      - multi_turn_conversations
      - knowledge_base_integration
      - sentiment_analysis
    skills:
      - "Process natural language queries about onboarding status and procedures"
      - "Provide contextual and helpful responses to employee questions"
      - "Maintain conversation history for personalized user experience"
      - "Integrate with knowledge base for comprehensive information retrieval"
      - "Analyze employee sentiment and provide appropriate support"
      - "Support multiple languages for global workforce engagement"
    conversation_memory: 5000
    supported_languages:
      - english
      - spanish
      - french
      - german
      - mandarin

# MCP Servers Configuration with Multi-Environment Support
mcp_servers:
  - name: employee-onboarding-agent-broker
    description: "Primary orchestration broker with complete employee onboarding capabilities"
    environments:
      production:
        url: "https://employee-onboarding-agent-broker.us-e1.cloudhub.io"
        flex_gateway_url: "https://employee-onboarding-gateway.sandbox.anypoint.mulesoft.com/broker"
      staging:
        url: "https://employee-onboarding-agent-broker-staging.us-e1.cloudhub.io"
        flex_gateway_url: "https://employee-onboarding-gateway-staging.sandbox.anypoint.mulesoft.com/broker"
      development:
        url: "http://localhost:8080"
        docker_url: "http://localhost:8080"
    timeout: 45000
    retry_attempts: 5
    health_check: "/health"
    tools_endpoint: "/mcp/tools"
    info_endpoint: "/mcp/info"
    failover:
      enabled: true
      strategy: "circuit_breaker"
    rate_limiting:
      requests_per_minute: 100
      burst_capacity: 20
    
  - name: employee-onboarding-mcp-server
    description: "Employee management service with data processing"
    environments:
      production:
        url: "https://employee-onboarding-mcp-server.us-e1.cloudhub.io"
        flex_gateway_url: "https://employee-onboarding-gateway.sandbox.anypoint.mulesoft.com/employee"
      staging:
        url: "https://employee-onboarding-mcp-server-staging.us-e1.cloudhub.io"
      development:
        url: "http://localhost:8081"
        docker_url: "http://localhost:8081"
    timeout: 30000
    retry_attempts: 3
    health_check: "/health"
    caching:
      enabled: true
      ttl: 300  # 5 minutes
    data_encryption:
      enabled: true
      algorithm: "AES-256-GCM"
      
  - name: asset-allocation-mcp-server
    description: "Asset allocation service with optimization capabilities"
    environments:
      production:
        url: "https://assets-allocation-mcp-server.us-e1.cloudhub.io"
        flex_gateway_url: "https://employee-onboarding-gateway.sandbox.anypoint.mulesoft.com/assets"
      staging:
        url: "https://assets-allocation-mcp-server-staging.us-e1.cloudhub.io"
      development:
        url: "http://localhost:8082"
        docker_url: "http://localhost:8082"
    timeout: 30000
    retry_attempts: 3
    health_check: "/health"
    optimization_engine:
      enabled: true
      algorithms: ["ml_prediction", "cost_optimization", "rule_based"]
      
  - name: email-notification-mcp-server
    description: "Multi-channel notification service with personalization"
    environments:
      production:
        url: "https://email-notification-mcp-server.us-e1.cloudhub.io"
        flex_gateway_url: "https://employee-onboarding-gateway.sandbox.anypoint.mulesoft.com/notifications"
      staging:
        url: "https://notification-mcp-server-staging.us-e1.cloudhub.io"
      development:
        url: "http://localhost:8083"
        docker_url: "http://localhost:8083"
    timeout: 25000
    retry_attempts: 3
    health_check: "/health"
    channels:
      email:
        enabled: true
        provider: "smtp"
      sms:
        enabled: true
        provider: "twilio"
      slack:
        enabled: true
        webhook_url: "${SLACK_WEBHOOK_URL}"

# Broker Configuration with Advanced Orchestration
brokers:
  - name: main-orchestration-broker
    description: "Primary broker with AI-powered orchestration capabilities"
    agents:
      - onboarding-master-orchestrator
      - employee-data-specialist
      - intelligent-asset-allocator
      - intelligent-communication-manager
      - nlp-query-processor
    mcp_server: employee-onboarding-agent-broker
    capabilities:
      - advanced_process_orchestration
      - intelligent_agent_coordination
      - predictive_error_recovery
      - real_time_monitoring
      - performance_optimization
      - compliance_enforcement
    features:
      ai_powered_routing: true
      predictive_scaling: true
      intelligent_caching: true
      advanced_monitoring: true
    orchestration_patterns:
      - sequential_execution
      - parallel_execution
      - conditional_branching
      - error_recovery_workflows
      - compensation_transactions

# Comprehensive Workflow Configuration
workflows:
  - name: complete-employee-onboarding-orchestration
    description: "Complete employee onboarding orchestrated through MCP broker"
    version: "2.0"
    trigger: 
      type: "employee_onboarding_request"
      validation: "comprehensive"
    execution_mode: "hybrid_parallel"
    optimization: "ai_powered"
    
    steps:
      - name: initiate_onboarding_process
        agent: onboarding-master-orchestrator
        tool: orchestrate-employee-onboarding
        description: "Initiate complete onboarding process through MCP broker"
        timeout: 60
        input_parameters:
          - firstName
          - lastName  
          - email
          - phone
          - department
          - position
          - startDate
          - salary
          - manager
          - managerEmail
          - companyName
          - assets
        retry_policy:
          max_attempts: 3
          backoff_strategy: "exponential"
        validation_rules:
          - required_fields_complete
          - data_format_valid
          - business_rules_satisfied
        
      - name: monitor_onboarding_progress
        agent: onboarding-master-orchestrator
        tool: get-onboarding-status
        description: "Monitor and track onboarding process progress"
        depends_on: [initiate_onboarding_process]
        timeout: 30
        execution_type: "polling"
        polling_interval: 5000  # 5 seconds
        max_polls: 60  # 5 minutes maximum
        
      - name: handle_onboarding_failures
        agent: onboarding-master-orchestrator
        tool: retry-failed-step
        description: "Handle any failed steps in the onboarding process"
        conditional: "on_failure"
        timeout: 45
        retry_strategies:
          - immediate_retry
          - delayed_retry
          - manual_intervention
          
      - name: verify_system_health
        agent: onboarding-master-orchestrator
        tool: check-system-health
        description: "Verify health of all MCP services"
        execution_type: "background"
        frequency: "continuous"
        alert_thresholds:
          response_time: 5000  # 5 seconds
          error_rate: 0.05     # 5%
          availability: 0.99   # 99%

# Advanced Policy Configuration
policies:
  - name: comprehensive_orchestration_policy
    description: "Comprehensive policy for MCP broker orchestration"
    type: orchestration
    version: "2.0"
    rules:
      - broker_selection: "primary_with_fallback"
      - request_routing: "intelligent_load_balancing"
      - error_handling: "circuit_breaker_with_retry"
      - timeout_management: "adaptive_timeouts"
      - resource_management: "dynamic_scaling"
    orchestration_settings:
      max_concurrent_workflows: 50
      default_timeout: 30000
      circuit_breaker_threshold: 5
      retry_backoff_multiplier: 2.0

  - name: data_validation_and_security_policy
    description: "Enhanced data validation with security controls"
    type: validation_security
    version: "2.0"
    rules:
      - input_validation: "strict_schema_validation"
      - data_sanitization: "comprehensive_cleansing"
      - encryption_requirements: "end_to_end_encryption"
      - access_control: "role_based_authorization"
      - audit_logging: "comprehensive_audit_trail"
    security_controls:
      pii_detection: true
      data_masking: true
      encryption_at_rest: true
      encryption_in_transit: true

  - name: communication_and_notification_policy
    description: "Advanced communication management with personalization"
    type: communication
    version: "2.0"
    rules:
      - personalization: "ai_powered_content_generation"
      - channel_selection: "preference_based_routing"
      - timing_optimization: "behavioral_analysis"
      - accessibility_compliance: "wcag_2_1_aa_standard"
      - multi_language_support: "automatic_localization"
    communication_features:
      real_time_delivery: true
      delivery_confirmation: true
      response_tracking: true
      sentiment_analysis: true

# Enhanced Monitoring and Analytics
monitoring:
  enabled: true
  level: comprehensive
  real_time_dashboards: true
  
  metrics:
    orchestration_metrics:
      - workflow_execution_time
      - step_completion_rate
      - error_classification_and_count
      - broker_response_time
      - mcp_service_availability
      - resource_utilization_patterns
    
    business_metrics:
      - onboarding_completion_rate
      - employee_satisfaction_score
      - time_to_productivity
      - cost_per_onboarding
      - compliance_adherence_rate
      - asset_allocation_efficiency
    
    ai_and_optimization_metrics:
      - prediction_accuracy
      - optimization_effectiveness
      - personalization_success_rate
      - natural_language_processing_quality
  
  alerting:
    critical_alerts:
      - broker_service_failure
      - security_policy_violation
      - compliance_breach
      - data_corruption_detected
    warning_alerts:
      - performance_degradation
      - resource_threshold_exceeded
      - prediction_accuracy_decline
    informational_alerts:
      - optimization_opportunity
      - capacity_planning_recommendation
      - trend_analysis_update

  analytics_and_reporting:
    predictive_analytics: true
    trend_analysis: true
    optimization_recommendations: true
    custom_reporting: true
    executive_dashboards: true

# Comprehensive Security Configuration
security:
  authentication:
    primary_method:
      type: "oauth2_with_pkce"
      provider: "okta"
    secondary_method:
      type: "api_key_with_jwt"
      rotation_period: "30_days"
    multi_factor_authentication:
      required: true
      methods: ["totp", "sms", "email", "biometric"]
      
  authorization:
    model: "RBAC_with_ABAC"
    roles:
      - super_admin: 
          permissions: ["*"]
          mfa_required: true
          session_timeout: 30
      - hr_admin:
          permissions: ["onboarding:*", "employee:*", "reporting:read", "analytics:read"]
          session_timeout: 60
      - hr_specialist:
          permissions: ["onboarding:create", "onboarding:update", "employee:read"]
          session_timeout: 120
      - it_admin:
          permissions: ["asset:*", "system:health", "monitoring:read"]
          session_timeout: 60
      - manager:
          permissions: ["onboarding:read:own_department", "employee:read:own_department"]
          session_timeout: 240
    
  encryption_and_protection:
    data_in_transit: 
      protocol: "TLS_1_3"
      cipher_suites: ["ECDHE-RSA-AES256-GCM-SHA384", "ECDHE-RSA-CHACHA20-POLY1305"]
    data_at_rest:
      algorithm: "AES-256-GCM"
      key_management: "HSM_based_with_rotation"
    sensitive_data_fields: 
      - email
      - phone_number
      - social_security_number
      - personal_documents
      - financial_information
      - health_information
  
  privacy_and_compliance:
    data_minimization: true
    purpose_limitation: true
    consent_management: true
    right_to_erasure: true
    data_portability: true
    breach_notification: true

# Multi-Environment Configuration
environments:
  - name: production
    description: "Production environment with full security and monitoring"
    active: false
    configuration:
      mcp_broker_url: "https://employee-onboarding-agent-broker.us-e1.cloudhub.io"
      encryption_level: "maximum"
      monitoring_level: "comprehensive"
      audit_retention: "7_years"
    variables:
      GROQ_API_KEY: "${PROD_GROQ_API_KEY}"
      DATABASE_URL: "${PROD_DATABASE_URL}"
      EMAIL_FROM_ADDRESS: "${PROD_EMAIL_FROM_ADDRESS}"
      ENCRYPTION_KEY: "${PROD_ENCRYPTION_KEY}"
      SLACK_WEBHOOK_URL: "${PROD_SLACK_WEBHOOK_URL}"
    
  - name: staging
    description: "Staging environment for pre-production testing"
    active: false
    configuration:
      mcp_broker_url: "https://employee-onboarding-agent-broker-staging.us-e1.cloudhub.io"
      encryption_level: "standard"
      monitoring_level: "standard"
      audit_retention: "1_year"
    variables:
      GROQ_API_KEY: "${STAGING_GROQ_API_KEY}"
      DATABASE_URL: "${STAGING_DATABASE_URL}"
      EMAIL_FROM_ADDRESS: "${STAGING_EMAIL_FROM_ADDRESS}"
    
  - name: development
    description: "Development environment with local services and debugging"
    active: true
    configuration:
      mcp_broker_url: "http://localhost:8080"
      encryption_level: "basic"
      monitoring_level: "debug"
      audit_retention: "30_days"
    variables:
      GROQ_API_KEY: "${DEV_GROQ_API_KEY}"
      DATABASE_URL: "jdbc:h2:mem:testdb"
      EMAIL_FROM_ADDRESS: "dev-noreply@company.com"

# Advanced Integration Configuration
integrations:
  external_systems:
    - name: "Human_Resources_Information_System"
      type: "workday"
      connection_string: "${WORKDAY_CONNECTION}"
      sync_frequency: "real_time"
      data_mapping: "employee_profile_sync"
    
    - name: "Identity_Provider"
      type: "okta"
      connection_string: "${OKTA_CONNECTION}"
      sync_frequency: "real_time"
      integration_type: "sso_and_provisioning"
    
    - name: "Asset_Management_System"
      type: "servicenow"
      connection_string: "${SERVICENOW_CONNECTION}"
      sync_frequency: "hourly"
      integration_type: "asset_lifecycle_management"
    
    - name: "Communication_Platform"
      type: "slack"
      connection_string: "${SLACK_CONNECTION}"
      sync_frequency: "real_time"
      integration_type: "notifications_and_collaboration"
    
    - name: "Learning_Management_System"
      type: "cornerstone_ondemand"
      connection_string: "${LMS_CONNECTION}"
      sync_frequency: "daily"
      integration_type: "training_assignment"

  api_gateways:
    - name: "Flex_Gateway"
      url: "https://employee-onboarding-gateway.sandbox.anypoint.mulesoft.com"
      features: ["rate_limiting", "authentication", "monitoring", "caching"]
      policies: ["security_policy", "traffic_management_policy"]

# Performance and Scalability Configuration
performance:
  caching:
    enabled: true
    layers: ["memory", "redis", "cdn"]
    strategies:
      employee_data: 
        ttl: 300
        invalidation: "event_driven"
      asset_data: 
        ttl: 600
        invalidation: "time_based"
      configuration_data: 
        ttl: 3600
        invalidation: "manual"
  
  load_balancing:
    enabled: true
    algorithm: "weighted_round_robin_with_health_checks"
    health_check_interval: 30
    failover_threshold: 3
  
  auto_scaling:
    enabled: true
    scaling_policies:
      cpu_threshold: 70
      memory_threshold: 80
      request_rate_threshold: 1000
    scaling_parameters:
      min_instances: 2
      max_instances: 20
      scale_up_cooldown: 300
      scale_down_cooldown: 600
    
  optimization:
    connection_pooling: true
    query_optimization: true
    resource_scheduling: "intelligent_workload_distribution"
    batch_processing: true

# Disaster Recovery and Business Continuity
disaster_recovery:
  enabled: true
  strategy: "active_passive_with_geographic_redundancy"
  backup_and_restoration:
    frequency: "continuous"
    retention_policy: "3_months_daily_7_years_monthly"
    encryption: "AES_256_with_key_escrow"
  
  failover_configuration:
    automatic_failover: true
    recovery_time_objective: "5_minutes"
    recovery_point_objective: "1_minute"
    testing_frequency: "monthly"
  
  geographic_distribution:
    primary_region: "us-east-1"
    secondary_region: "us-west-2"
    data_replication: "synchronous"
    network_redundancy: "multiple_isp_with_bgp"

# Compliance and Governance
compliance:
  frameworks:
    - name: "GDPR"
      version: "2018"
      controls: ["data_minimization", "consent_management", "right_to_erasure"]
    - name: "CCPA"
      version: "2020"
      controls: ["consumer_rights", "data_transparency", "opt_out_mechanisms"]
    - name: "SOX"
      version: "2002"
      controls: ["financial_controls", "audit_trails", "segregation_of_duties"]
    - name: "ISO_27001"
      version: "2013"
      controls: ["information_security_management", "risk_assessment", "incident_response"]
  
  governance_processes:
    data_classification: "automatic_with_ml_detection"
    policy_enforcement: "real_time_with_alerts"
    compliance_reporting: "automated_with_executive_summary"
    audit_preparation: "continuous_readiness"

# Advanced AI and Machine Learning Features
ai_features:
  natural_language_processing:
    enabled: true
    models: ["intent_recognition", "sentiment_analysis", "entity_extraction"]
    languages: ["en", "es", "fr", "de", "zh", "ja", "pt"]
    confidence_threshold: 0.85
  
  predictive_analytics:
    enabled: true
    models: ["onboarding_success_predictor", "asset_demand_forecaster", "satisfaction_predictor"]
    forecasting_horizon: "30_days"
    model_refresh_frequency: "weekly"
  
  intelligent_automation:
    enabled: true
    automation_rules: ["error_recovery", "resource_optimization", "personalization"]
    learning_algorithms: ["reinforcement_learning", "supervised_learning", "unsupervised_learning"]
    
  adaptive_personalization:
    enabled: true
    personalization_factors: ["role", "department", "location", "preferences", "behavior_patterns"]
    real_time_adaptation: true
    privacy_preserving: true
