<!DOCTYPE html>
<html lang="en">

        }

        .toggle {
            position: relative;
            width: 60px;
            height: 30px;
            background: #ccc;
            border-radius: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .toggle.active {
            background: #28a745;
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle.active::after {
            transform: translateX(30px);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;

        .btn-primary {

        .btn-danger {

        }

        .btn-clear {

        }

        }

        .sidebar {

            border-right: 1px solid #dee2e6;

        }

        .nav-item {

        // Utility Functions
        function getBaseUrl(serverName) {
            switch(config.environment) {
                case 'cloudhub':
                    return config.cloudhub.urls[serverName];
                case 'staging':
                    return config.staging.urls[serverName];
                case 'local':
                default:
                    const port = config.local.ports[serverName];
                    return `${config.local.baseUrl}:${port}`;
            }
        }
        
        function validateUrl(url) {
            try {
                new URL(url);
                return true;
            } catch (error) {
                console.error(`Invalid URL: ${url}`, error);
                return false;
            }
        }

        function buildUrl(serverName, endpoint) {
            const baseUrl = getBaseUrl(serverName);
            
            if (!baseUrl) {
                throw new Error(`No base URL configured for server: ${serverName}`);
            }
            
            let url = baseUrl + endpoint.path;
            
            // Replace path parameters
            if (endpoint.pathParams) {
                Object.keys(endpoint.pathParams).forEach(param => {
                    url = url.replace(`{${param}}`, endpoint.pathParams[param]);
                });
            }
            
            // Add query parameters
            if (endpoint.queryParams) {
                const params = new URLSearchParams(endpoint.queryParams);
                url += '?' + params.toString();
            }
            
            // Validate the final URL
            if (!validateUrl(url)) {
                throw new Error(`Invalid URL constructed: ${url}`);
            }
            
            return url;
        }

        // Environment Toggle
        function toggleEnvironment() {
            const button = document.getElementById('env-button');
            const label = document.getElementById('env-label');
            
            // Cycle through environments: local -> cloudhub -> staging -> local
            switch(config.environment) {
                case 'local':
                    config.environment = 'cloudhub';
                    button.className = 'btn btn-success';
                    label.textContent = 'CLOUDHUB';
                    break;
                case 'cloudhub':
                    config.environment = 'staging';
                    button.className = 'btn btn-warning';
                    label.textContent = 'STAGING';
                    break;
                case 'staging':
                default:
                    config.environment = 'local';
                    button.className = 'btn btn-primary';
                    label.textContent = 'LOCAL';
                    break;
            }
            
            console.log(`Environment switched to: ${config.environment}`);
            
            // Clear previous test results when switching environments
            clearAllResults();
            
            // Refresh the current content to show updated URLs
            const activeNavItem = document.querySelector('.nav-item.active');
            if (activeNavItem) {
                const serverName = activeNavItem.getAttribute('data-server');
                if (serverName === 'overview') {
                    loadOverviewContent();
                } else {
                    loadServerContent(serverName);
                }
            }
        }

        // Server Navigation

            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-server="${serverName}"]`).classList.add('active');

            // Load content
            if (serverName === 'overview') {
                loadOverviewContent();
            } else {

            }
        }

                <div class="server-info" style="background: #f8d7da; border-left-color: #dc3545; color: #721c24;">
                    <h3>🚫 CloudHub CORS Restriction Detected</h3>
                    <p><strong>Browser Security Limitation:</strong> Web browsers block cross-origin requests to CloudHub URLs. This is normal browser security behavior.</p>
                    
                    <div style="background: #ffffff; padding: 15px; border-radius: 5px; margin: 15px 0;">
                        <h4 style="color: #28a745; margin-bottom: 10px;">✅ WORKING SOLUTIONS:</h4>
                        <ol style="margin: 5px 0; padding-left: 20px; color: #212529;">
                            <li><strong>Use Postman Collection</strong> - Import the updated Postman collection for full CloudHub testing</li>
                            <li><strong>Use API Testing Tools</strong> - Insomnia, Thunder Client, or similar tools</li>
                            <li><strong>Switch to LOCAL</strong> - If you have servers running locally</li>
                        </ol>
                    </div>
                    
                    <p><strong style="color: #dc3545;">CloudHub Environment Testing Disabled in Browser</strong></p>
                    <p><em>The servers and APIs work perfectly - this is just a browser CORS restriction.</em></p>
                </div>
            ` : '';
            
            content.innerHTML = `
                <div class="server-info">
                    <h2>🏗️ Employee Onboarding MCP System Overview (Updated v2.0.0)</h2>
                    <p>This comprehensive test suite covers all MCP (Model Context Protocol) servers in the Employee Onboarding System with updated API endpoints:</p>
                    <ul style="margin: 15px 0; padding-left: 20px;">
                        <li><strong>Agent Broker MCP:</strong> Central orchestrator for complete employee onboarding workflow</li>
                        <li><strong>Employee Onboarding MCP:</strong> Employee lifecycle management and HR processes</li>
                        <li><strong>Asset Allocation MCP:</strong> IT asset management and allocation system</li>
                        <li><strong>Notification MCP:</strong> Email notification services for onboarding process</li>
                    </ul>
                </div>
                
                ${corsWarning}

                <div class="workflow-section">
                    <h3>🔄 End-to-End Workflow Test</h3>
                    <p>The E2E workflow test simulates a complete employee onboarding process:</p>
                    <ol style="margin: 10px 0; padding-left: 20px;">
                        <li>Create employee profile via Employee Onboarding MCP</li>
                        <li>Allocate IT assets via Asset Allocation MCP</li>
                        <li>Send welcome notifications via Notification MCP</li>
                        <li>Orchestrate complete process via Agent Broker MCP</li>
                        <li>Verify all steps completed successfully</li>
                    </ol>
                    <button class="btn btn-success" onclick="runEndToEndWorkflow()" style="margin-top: 15px;">
                        🚀 Start E2E Workflow Test
                    </button>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
                    <div class="endpoint-card">
                        <div class="endpoint-header">
                            <h4>🤖 Agent Broker MCP</h4>
                            <span class="endpoint-method method-post">Ready</span>
                        </div>
                        <div class="endpoint-body active">
                            <p>Endpoints: 5 (Updated)</p>
                            <p>Functions: Orchestration, status tracking, retry operations</p>
                            <p>Base URL: /api/mcp/tools/*</p>
                        </div>
                    </div>

                    <div class="endpoint-card">
                        <div class="endpoint-header">
                            <h4>👥 Employee Onboarding MCP</h4>
                            <span class="endpoint-method method-get">Ready</span>
                        </div>
                        <div class="endpoint-body active">
                            <p>Endpoints: 6 (Updated)</p>
                            <p>Functions: Employee lifecycle management</p>
                            <p>Base URL: /api/mcp/tools/*</p>
                        </div>
                    </div>

                    <div class="endpoint-card">
                        <div class="endpoint-header">
                            <h4>💻 Asset Allocation MCP</h4>
                            <span class="endpoint-method method-put">Ready</span>
                        </div>
                        <div class="endpoint-body active">
                            <p>Endpoints: 7 (Updated)</p>
                            <p>Functions: Asset management, tracking</p>
                            <p>Base URL: /api/mcp/tools/*</p>
                        </div>
                    </div>

                    <div class="endpoint-card">
                        <div class="endpoint-header">
                            <h4>📧 Notification MCP</h4>
                            <span class="endpoint-method method-delete">Ready</span>
                        </div>
                        <div class="endpoint-body active">
                            <p>Endpoints: 6 (Updated)</p>
                            <p>Functions: Email notifications, testing</p>
                            <p>Base URL: /mcp/tools/*</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function loadServerContent(serverName) {
            const server = mcpServers[serverName];
            const content = document.getElementById('test-content');
            
            // Build environment info based on current environment
            const baseUrl = getBaseUrl(serverName);
            let envInfo;
            
            if (config.environment === 'local') {
                const port = config.local.ports[serverName];
                envInfo = `<strong>Environment:</strong> ${config.environment.toUpperCase()} | <strong>Port:</strong> ${port} | <strong>Base URL:</strong> ${baseUrl}`;
            } else {
                envInfo = `<strong>Environment:</strong> ${config.environment.toUpperCase()} | <strong>Base URL:</strong> ${baseUrl}`;
            }
            
            let html = `
                <div class="server-info">
                    <h2>🔧 ${server.name}</h2>
                    <p>${server.description}</p>
                    <p>${envInfo}</p>
                </div>
            `;

            server.endpoints.forEach((endpoint, index) => {
                html += `
                    <div class="endpoint-card">
                        <div class="endpoint-header collapsible" onclick="toggleEndpoint('${serverName}-${index}')">
                            <div>
                                <span class="endpoint-method method-${endpoint.method.toLowerCase()}">${endpoint.method}</span>
                                <strong>${endpoint.name}</strong> - ${endpoint.description}
                            </div>
                            <button class="btn btn-primary" onclick="executeTest('${serverName}', ${index}); event.stopPropagation();">
                                Test
                            </button>
                        </div>
                        <div class="endpoint-body" id="${serverName}-${index}">
                            <div class="form-group">
                                <label>URL:</label>
                                <input type="text" class="form-control" id="${serverName}-${index}-url" value="${buildUrl(serverName, endpoint)}" readonly>
                            </div>
                            
                            ${endpoint.payload ? `
                            <div class="form-group">
                                <label>Request Payload:</label>
                                <textarea class="form-control" id="${serverName}-${index}-payload">${JSON.stringify(endpoint.payload, null, 2)}</textarea>
                            </div>
                            ` : ''}
                            
                            <div class="form-group">
                                <button class="btn btn-primary" onclick="executeTest('${serverName}', ${index})">
                                    <span id="${serverName}-${index}-btn-text">Execute Test</span>
                                </button>
                            </div>
                            
                            <div class="response-area" id="${serverName}-${index}-response" style="display: none;">
                                <h5>Response:</h5>
                                <pre id="${serverName}-${index}-response-content"></pre>
                            </div>
                        </div>
                    </div>
                `;
            });

            content.innerHTML = html;
        }

        // Endpoint Toggle
        function toggleEndpoint(endpointId) {
            const element = document.getElementById(endpointId);
            const header = element.previousElementSibling;
            
            if (element.classList.contains('active')) {
                element.classList.remove('active');
                header.classList.remove('active');
            } else {
                element.classList.add('active');
                header.classList.add('active');
            }
        }

        // Test Execution
        async function executeTest(serverName, endpointIndex) {
            const endpoint = mcpServers[serverName].endpoints[endpointIndex];
            const testId = `${serverName}-${endpointIndex}`;
            
            // Update UI
            const btnText = document.getElementById(`${testId}-btn-text`);
            const responseArea = document.getElementById(`${testId}-response`);
            const responseContent = document.getElementById(`${testId}-response-content`);
            
            btnText.innerHTML = '<div class="loading"><div class="spinner"></div>Testing...</div>';
            responseArea.style.display = 'block';
            responseContent.textContent = 'Executing test...';
            
            // Update test counts
            testResults.total++;
            testResults.pending++;
            updateTestSummary();
            updateNavStatus(serverName, 'pending');
            
            try {
                const url = buildUrl(serverName, endpoint);
                console.log(`Testing ${endpoint.method} ${url}`);
                
                const options = {
                    method: endpoint.method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    timeout: config.timeout
                };
                
                // Add payload for POST/PUT requests
                if (endpoint.payload && (endpoint.method === 'POST' || endpoint.method === 'PUT')) {
                    const payloadElement = document.getElementById(`${testId}-payload`);
                    let payloadData;
                    
                    if (payloadElement) {
                        try {
                            payloadData = JSON.parse(payloadElement.value);
                        } catch (parseError) {
                            throw new Error(`Invalid JSON payload: ${parseError.message}`);
                        }
                    } else {
                        payloadData = endpoint.payload;
                    }
                    
                    options.body = JSON.stringify(payloadData);
                    console.log(`Request payload:`, payloadData);
                }
                
                // Create abort controller for timeout
                const controller = new AbortController();
                options.signal = controller.signal;
                
                const timeoutId = setTimeout(() => controller.abort(), config.timeout);
                
                const response = await fetch(url, options);
                clearTimeout(timeoutId);
                
                const responseText = await response.text();
                let responseData;
                
                try {
                    responseData = JSON.parse(responseText);
                } catch {
                    responseData = responseText;
                }
                
                // Display results
                const result = {
                    url: url,
                    method: endpoint.method,
                    status: response.status,
                    statusText: response.statusText,
                    headers: Object.fromEntries(response.headers.entries()),
                    data: responseData,
                    timestamp: new Date().toISOString()
                };
                
                console.log(`Response:`, result);
                
                if (response.ok) {
                    responseArea.className = 'response-area success';
                    responseContent.textContent = JSON.stringify(result, null, 2);
                    testResults.passed++;
                    updateNavStatus(serverName, 'success');
                } else {
                    responseArea.className = 'response-area error';
                    responseContent.textContent = JSON.stringify(result, null, 2);
                    testResults.failed++;
                    updateNavStatus(serverName, 'error');
                }
                
            } catch (error) {
                console.error(`Test failed for ${serverName}:`, error);
                
                responseArea.className = 'response-area error';
                
                let errorMessage = `Error: ${error.message}\n\n`;
                
                if (error.name === 'AbortError') {
                    errorMessage += 'Request timed out.\n\n';
                } else if (error.message.includes('CORS') || error.message.includes('cors')) {
                    errorMessage += '🚫 CORS ERROR DETECTED 🚫\n';
                    errorMessage += 'This is a browser security restriction when making cross-origin requests.\n\n';
                    errorMessage += 'SOLUTIONS:\n';
                    errorMessage += '✅ Use Postman, Insomnia, or similar API testing tools\n';
                    errorMessage += '✅ Switch to LOCAL environment if servers are running locally\n';
                    errorMessage += '✅ Deploy this HTML to the same domain as the APIs\n';
                    errorMessage += '✅ Configure server CORS headers (if you control the server)\n\n';
                } else if (error.message.includes('fetch') || error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMessage += '🌐 NETWORK/CORS ERROR 🌐\n';
                    errorMessage += 'This is likely a CORS (Cross-Origin Resource Sharing) restriction.\n';
                    errorMessage += 'Browsers block requests from web pages to different domains for security.\n\n';
                    errorMessage += 'RECOMMENDED ACTIONS:\n';
                    errorMessage += '🔧 Use Postman for CloudHub API testing (works perfectly)\n';
                    errorMessage += '🔧 Switch to LOCAL environment for local server testing\n';
                    errorMessage += '🔧 Check browser developer console for detailed CORS error\n\n';
                } else {
                    errorMessage += 'Possible causes:\n';
                    errorMessage += `- Server not running (${config.environment} environment)\n`;
                    errorMessage += '- Network connectivity problems\n';
                    errorMessage += `- Invalid endpoint URL: ${getBaseUrl(serverName)}\n`;
                    errorMessage += `- Timeout after ${config.timeout}ms\n`;
                }
                
                if (config.environment !== 'local') {
                    errorMessage += '\n💡 TIP: CloudHub APIs work perfectly in Postman but may have CORS restrictions in browsers.\n';
                }
                
                if (config.environment === 'local') {
                    errorMessage += `\nFor local testing, ensure server is running on port ${config.local.ports[serverName]}`;
                }
                
                const errorResult = {
                    error: error.message,
                    errorType: error.name,
                    url: getBaseUrl(serverName) + endpoint.path,
                    environment: config.environment,
                    isCorsLikely: error.message.includes('fetch') || error.message.includes('CORS') || error.message.includes('NetworkError'),
                    recommendation: config.environment !== 'local' ? 'Use Postman for CloudHub testing' : 'Ensure local server is running',
                    timestamp: new Date().toISOString()
                };
                
                responseContent.textContent = errorMessage + '\n\nError Details:\n' + JSON.stringify(errorResult, null, 2);
                testResults.failed++;
                updateNavStatus(serverName, 'error');
            } finally {
                testResults.pending--;
                btnText.textContent = 'Execute Test';
                updateTestSummary();
            }
        }

        // Health Check Functions
        async function runHealthChecks() {
            const servers = Object.keys(mcpServers);
            
            for (const serverName of servers) {
                const healthEndpoint = mcpServers[serverName].endpoints.find(ep => ep.name === 'Health Check');
                if (healthEndpoint) {
                    const index = mcpServers[serverName].endpoints.indexOf(healthEndpoint);
                    await executeTest(serverName, index);
                }
            }
        }

        // Run All Tests
        async function runAllTests() {
            const servers = Object.keys(mcpServers);
            
            for (const serverName of servers) {
                showServer(serverName);
                
                for (let i = 0; i < mcpServers[serverName].endpoints.length; i++) {
                    await executeTest(serverName, i);
                    // Add delay between tests
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
            
            showServer('overview');
        }

        // End-to-End Workflow Test
        async function runEndToEndWorkflow() {
            showServer('overview');
            const content = document.getElementById('test-content');
            
            content.innerHTML = `
                <div class="server-info">
                    <h2>🔄 End-to-End Workflow Test in Progress</h2>
                    <p>Testing complete employee onboarding workflow...</p>
                </div>
                <div class="workflow-section">
                    <h3>Workflow Steps:</h3>
                    <div id="workflow-steps">
                        <div id="step-1" class="workflow-step">1. Creating Employee Profile... <span class="spinner"></span></div>
                        <div id="step-2" class="workflow-step">2. Allocating IT Assets... ⏳</div>
                        <div id="step-3" class="workflow-step">3. Sending Welcome Email... ⏳</div>
                        <div id="step-4" class="workflow-step">4. Orchestrating Complete Process... ⏳</div>
                        <div id="step-5" class="workflow-step">5. Verifying Results... ⏳</div>
                    </div>
                </div>
                <div class="response-area" id="workflow-results">
                    <h5>Workflow Results:</h5>
                    <pre id="workflow-results-content">Starting workflow...</pre>
                </div>
            `;

            const results = [];
            
            try {
                // Step 1: Create Employee Profile
                await updateWorkflowStep(1, 'in-progress');
                const createResult = await executeWorkflowStep('employee-onboarding', 2);
                results.push({ step: 'Create Employee', success: createResult.success, data: createResult.data });
                await updateWorkflowStep(1, createResult.success ? 'success' : 'error');
                
                // Step 2: Allocate Assets
                await updateWorkflowStep(2, 'in-progress');
                const assetResult = await executeWorkflowStep('asset-allocation', 2);
                results.push({ step: 'Allocate Assets', success: assetResult.success, data: assetResult.data });
                await updateWorkflowStep(2, assetResult.success ? 'success' : 'error');
                
                // Step 3: Send Welcome Email
                await updateWorkflowStep(3, 'in-progress');
                const emailResult = await executeWorkflowStep('notification', 2);
                results.push({ step: 'Send Welcome Email', success: emailResult.success, data: emailResult.data });
                await updateWorkflowStep(3, emailResult.success ? 'success' : 'error');
                
                // Step 4: Orchestrate Complete Process
                await updateWorkflowStep(4, 'in-progress');
                const orchestrateResult = await executeWorkflowStep('agent-broker', 2);
                results.push({ step: 'Orchestrate Process', success: orchestrateResult.success, data: orchestrateResult.data });
                await updateWorkflowStep(4, orchestrateResult.success ? 'success' : 'error');
                
                // Step 5: Verify Results
                await updateWorkflowStep(5, 'in-progress');
                const verifyResult = await executeWorkflowStep('agent-broker', 3);
                results.push({ step: 'Verify Results', success: verifyResult.success, data: verifyResult.data });
                await updateWorkflowStep(5, verifyResult.success ? 'success' : 'error');
                
            } catch (error) {
                results.push({ step: 'Workflow Error', success: false, error: error.message });
            }
            
            // Display final results
            document.getElementById('workflow-results-content').textContent = JSON.stringify(results, null, 2);
        }

        async function executeWorkflowStep(serverName, endpointIndex) {
            try {
                const endpoint = mcpServers[serverName].endpoints[endpointIndex];
                const url = buildUrl(serverName, endpoint);
                
                console.log(`Workflow step: ${endpoint.method} ${url}`);
                
                const options = {
                    method: endpoint.method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    timeout: config.timeout
                };
                
                if (endpoint.payload && (endpoint.method === 'POST' || endpoint.method === 'PUT')) {
                    options.body = JSON.stringify(endpoint.payload);
                    console.log(`Workflow payload:`, endpoint.payload);
                }
                
                // Create abort controller for timeout
                const controller = new AbortController();
                options.signal = controller.signal;
                
                const timeoutId = setTimeout(() => controller.abort(), config.timeout);
                
                const response = await fetch(url, options);
                clearTimeout(timeoutId);
                
                const responseText = await response.text();
                let responseData;
                
                try {
                    responseData = JSON.parse(responseText);
                } catch {
                    responseData = responseText;
                }
                
                return {
                    success: response.ok,
                    data: responseData,
                    status: response.status,
                    url: url,
                    timestamp: new Date().toISOString()
                };
            } catch (error) {
                console.error(`Workflow step failed:`, error);
                
                return {
                    success: false,
                    error: error.message,
                    url: buildUrl(serverName, mcpServers[serverName].endpoints[endpointIndex]),
                    timestamp: new Date().toISOString()
                };
            }
        }

        async function updateWorkflowStep(stepNumber, status) {
            const stepElement = document.getElementById(`step-${stepNumber}`);
            const icons = {
                'in-progress': '<div class="spinner"></div>',
                'success': '✅',
                'error': '❌',
                'pending': '⏳'
            };
            
            stepElement.innerHTML = stepElement.innerHTML.replace(/(<span class="spinner"><\/span>|⏳|✅|❌)/, icons[status]);
            
            return new Promise(resolve => setTimeout(resolve, 1000));
        }

        // UI Update Functions
        function updateNavStatus(serverName, status) {
            const navItem = document.querySelector(`[data-server="${serverName}"] .icon`);
            if (navItem) {
                navItem.className = `icon status-${status}`;
            }
        }

        function updateTestSummary() {
            document.getElementById('total-tests').textContent = testResults.total;
            document.getElementById('passed-tests').textContent = testResults.passed;
            document.getElementById('failed-tests').textContent = testResults.failed;
            document.getElementById('pending-tests').textContent = testResults.pending;
        }

        function clearAllResults() {
            testResults = { total: 0, passed: 0, failed: 0, pending: 0 };
            updateTestSummary();
            
            // Reset nav status
            document.querySelectorAll('.nav-item .icon').forEach(icon => {
                icon.className = 'icon status-idle';
            });
            
            // Clear response areas
            document.querySelectorAll('.response-area').forEach(area => {
                area.style.display = 'none';
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadOverviewContent();
            updateTestSummary();
        });

    </script>
