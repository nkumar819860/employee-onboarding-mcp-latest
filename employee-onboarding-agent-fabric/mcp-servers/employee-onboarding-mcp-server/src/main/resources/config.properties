# ==================================================================
# EMPLOYEE ONBOARDING MCP SERVER - PRODUCTION CONFIGURATION
# ==================================================================



# Application Metadata
app.name=employee-onboarding-mcp-server
app.version=1.0.0
app.description=Employee Onboarding MCP Server

# HTTP Configuration - Environment Aware
http.host=0.0.0.0
http.port=8081
https.port=8082

# Environment Configuration
env=Docker
deployment.target=docker

# Protocol Strategy - Environment Aware
# Values: http (for Docker/Dev), https (for CloudHub/Prod), auto
protocol.strategy=http
tls.enabled=false

# Database Selection Strategy
# Values: postgresql, h2, auto
db.strategy=h2
db.initialization.enabled=true
db.migration.enabled=false

# Connection Health Check
db.healthcheck.enabled=true
db.healthcheck.timeout=5000
db.retry.attempts=3
db.retry.delay=2000

# ==================================================================
# DATABASE CONFIGURATION - MULTI-DATABASE SUPPORT
# ==================================================================

# PostgreSQL Configuration (Production/CloudHub)
db.postgres.url=jdbc:postgresql://localhost:5432/employee_onboarding
db.postgres.username=postgres
db.postgres.password=postgres
db.postgres.driverClassName=org.postgresql.Driver
db.postgres.maxPoolSize=10
db.postgres.minPoolSize=2

# H2 Configuration (Local Development/Testing ONLY)
db.h2.url=jdbc:h2:mem:employee_onboarding;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
db.h2.username=sa
db.h2.password=
db.h2.driverClassName=org.h2.Driver
db.h2.maxPoolSize=5
db.h2.minPoolSize=1



# Connection Health Check
db.healthcheck.enabled=true
db.healthcheck.timeout=5000
db.retry.attempts=3
db.retry.delay=2000

# ==================================================================
# MCP SERVER CONFIGURATION
# ==================================================================
mcp.server.name=Employee Onboarding MCP
mcp.server.version=${app.version}
mcp.server.description=Production-grade employee onboarding management
mcp.server.baseUrl=https://employee-onboarding-mcp-server.us-e1.cloudhub.io

# Feature Flags
mcp.features.mock.enabled=false
mcp.features.database.required=true
mcp.features.audit.enabled=false

# ==================================================================
# OPERATIONAL CONFIGURATION
# ==================================================================

# Logging
log.level.root=INFO
log.level.app=DEBUG

# Monitoring
monitoring.health.enabled=true
monitoring.metrics.enabled=false

# Security
security.cors.enabled=true
security.auth.enabled=false

# ==================================================================
# CLOUD DEPLOYMENT OVERRIDES
# ==================================================================

# Automatically detected CloudHub properties
cloudhub.worker.type=MICRO
cloudhub.region=us-east-1

# ==================================================================
# PERFORMANCE TUNING
# ==================================================================

# Thread Pool Configuration
app.threads.core=4
app.threads.max=20
app.queue.size=100

# Cache Configuration
cache.enabled=false
cache.ttl=300000
cache.maxSize=1000
