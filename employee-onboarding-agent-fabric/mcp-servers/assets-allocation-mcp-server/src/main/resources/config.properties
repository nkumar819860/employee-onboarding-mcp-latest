# Asset Allocation MCP Server Configuration

# Database Configuration Strategy
# Controls which database configuration to use
# Values: h2 (default), postgres, postgresql
db.strategy=h2

# H2 Database Configuration (Default for CloudHub and Local Development)
db.h2.url=jdbc:h2:mem:assets_allocation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS ASSETS_ALLOCATION
db.h2.username=sa
db.h2.password=
db.h2.driverClassName=org.h2.Driver
db.h2.maxPoolSize=10
db.h2.minPoolSize=1
db.h2.acquireIncrement=1
db.h2.cacheSize=10

# PostgreSQL Database Configuration (for Production/Docker environments)
db.postgres.host=localhost
db.postgres.port=5432
db.postgres.name=assets_allocation
db.postgres.username=postgres
db.postgres.password=password}
db.postgres.url=jdbc:postgresql://localhost:${db.postgres.port}/assets-allocation
db.postgres.driverClassName=org.postgresql.Driver
db.postgres.maxPoolSize=15
db.postgres.minPoolSize=2
db.postgres.acquireIncrement2
db.postgres.cacheSize=20



# General Database Connection Settings
db.connection.maxPoolSize=${DB_MAX_POOL_SIZE:10}
db.connection.minPoolSize=${DB_MIN_POOL_SIZE:1}
db.connection.acquireIncrement=${DB_ACQUIRE_INCREMENT:1}
db.connection.cacheSize=${DB_CACHE_SIZE:10}

# HTTP Configuration (Local/Docker)
http.host=0.0.0.0
http.port=8081
https.port=8082

# Environment Configuration
environment=Sandbox
deployment.mode==standalone

# Application Configuration
app.name=Assets Allocation MCP Server
app.version=1.0.0

# CloudHub Configuration
cloudhub.environment=Sandbox
cloudhub.region=us-east-1

# Security Configuration
enable.cors=true
allowed.origins=*

# Logging Configuration
log.level=INFO

# Database Initialization and Migration Configuration
db.initialization.enabled=true
db.migration.enabled=false

# Connection Health Check
db.healthcheck.enabled=true
db.healthcheck.timeout=5000
db.retry.attempts=3
db.retry.delay=2000

# MCP Server Configuration
mcp.server.name=Assets Allocation MCP Server
mcp.server.version=1.0.0
mcp.server.description=MCP Server for Asset Allocation Management
mcp.server.baseUrl=https://assets-allocation-mcp-server.us-e1.cloudhub.io

# MCP Features Configuration
mcp.features.mock.enabled=false
mcp.features.database.required=true
mcp.features.audit.enabled=true

# Cache Configuration
cache.enabled=false

# Environment Configuration
env=sandbox
