# Asset Allocation MCP Server Configuration

# Database Configuration
db.postgres.host=localhost
db.postgres.port=5432
db.postgres.name=asset_allocation_db
db.postgres.username=postgres
db.postgres.password=password
db.postgres.url=jdbc:postgresql://localhost:5432/asset_allocation
db.postgres.driverClassName=org.postgresql.Driver

# H2 Database Configuration (for local development and CloudHub)
db.h2.url=jdbc:h2:mem:asset_allocation_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.h2.username=sa
db.h2.password=
db.h2.driverClassName=org.h2.Driver

# HTTP Configuration (Local/Docker)
http.host=${HTTP_HOST:0.0.0.0}
http.port=${HTTP_PORT:8083}

# HTTPS Configuration (CloudHub)
https.host=0.0.0.0
https.port=8082
http.port=8081
# Environment Configuration
environment=Sandbox
deployment.mode==standalone

# Application Configuration
app.name=Assets Allocation MCP Server
app.version=1.0.0

# CloudHub Configuration
cloudhub.environment=Sandbox
cloudhub.region=us-east-1

# Security Configuration
enable.cors=true
allowed.origins=*

# Logging Configuration
log.level=INFO
