# Asset Allocation MCP Server Configuration

# Database Configuration Strategy
# Controls which database configuration to use
# Values: h2 (default), postgres, postgresql
db.strategy=${DB_STRATEGY:h2}

# H2 Database Configuration (Default for CloudHub and Local Development)
db.h2.url=${DB_H2_URL:jdbc:h2:mem:assets_allocation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS ASSETS_ALLOCATION}
db.h2.username=${DB_H2_USERNAME:sa}
db.h2.password=${DB_H2_PASSWORD:}
db.h2.driverClassName=org.h2.Driver
db.h2.maxPoolSize=${DB_H2_MAX_POOL_SIZE:10}
db.h2.minPoolSize=${DB_H2_MIN_POOL_SIZE:1}
db.h2.acquireIncrement=${DB_H2_ACQUIRE_INCREMENT:1}
db.h2.cacheSize=${DB_H2_CACHE_SIZE:10}

# PostgreSQL Database Configuration (for Production/Docker environments)
db.postgres.host=${DB_POSTGRES_HOST:localhost}
db.postgres.port=${DB_POSTGRES_PORT:5432}
db.postgres.name=${DB_POSTGRES_NAME:assets_allocation}
db.postgres.username=${DB_POSTGRES_USERNAME:postgres}
db.postgres.password=${DB_POSTGRES_PASSWORD:password}
db.postgres.url=${DB_POSTGRES_URL:jdbc:postgresql://${db.postgres.host}:${db.postgres.port}/${db.postgres.name}}
db.postgres.driverClassName=org.postgresql.Driver
db.postgres.maxPoolSize=${DB_POSTGRES_MAX_POOL_SIZE:15}
db.postgres.minPoolSize=${DB_POSTGRES_MIN_POOL_SIZE:2}
db.postgres.acquireIncrement=${DB_POSTGRES_ACQUIRE_INCREMENT:2}
db.postgres.cacheSize=${DB_POSTGRES_CACHE_SIZE:20}

# PostgreSQL alias for compatibility
db.postgresql.host=${db.postgres.host}
db.postgresql.port=${db.postgres.port}
db.postgresql.name=${db.postgres.name}
db.postgresql.username=${db.postgres.username}
db.postgresql.password=${db.postgres.password}
db.postgresql.url=${db.postgres.url}
db.postgresql.driverClassName=${db.postgres.driverClassName}
db.postgresql.maxPoolSize=${db.postgres.maxPoolSize}
db.postgresql.minPoolSize=${db.postgres.minPoolSize}
db.postgresql.acquireIncrement=${db.postgres.acquireIncrement}
db.postgresql.cacheSize=${db.postgres.cacheSize}

# General Database Connection Settings
db.connection.maxPoolSize=${DB_MAX_POOL_SIZE:10}
db.connection.minPoolSize=${DB_MIN_POOL_SIZE:1}
db.connection.acquireIncrement=${DB_ACQUIRE_INCREMENT:1}
db.connection.cacheSize=${DB_CACHE_SIZE:10}

# HTTP Configuration (Local/Docker)
http.host=${HTTP_HOST:0.0.0.0}
http.port=${HTTP_PORT:8083}

# HTTPS Configuration (CloudHub)
https.host=0.0.0.0
https.port=8082
http.port=8081
# Environment Configuration
environment=Sandbox
deployment.mode==standalone

# Application Configuration
app.name=Assets Allocation MCP Server
app.version=1.0.0

# CloudHub Configuration
cloudhub.environment=Sandbox
cloudhub.region=us-east-1

# Security Configuration
enable.cors=true
allowed.origins=*

# Logging Configuration
log.level=INFO

# Database Initialization and Migration Configuration
db.initialization.enabled=true
db.migration.enabled=false

# Connection Health Check
db.healthcheck.enabled=true
db.healthcheck.timeout=5000
db.retry.attempts=3
db.retry.delay=2000

# MCP Server Configuration
mcp.server.name=Assets Allocation MCP Server
mcp.server.version=1.0.0
mcp.server.description=MCP Server for Asset Allocation Management
mcp.server.baseUrl=https://assets-allocation-mcp-server.us-e1.cloudhub.io

# MCP Features Configuration
mcp.features.mock.enabled=false
mcp.features.database.required=true
mcp.features.audit.enabled=true

# Cache Configuration
cache.enabled=false

# Environment Configuration
env=sandbox
