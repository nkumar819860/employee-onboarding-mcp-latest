# Asset Allocation MCP Server Configuration

# Database Configuration
db.host=${DB_HOST:localhost}
db.port=${DB_PORT:5432}
db.name=${DB_NAME:asset_allocation_db}
db.username=${DB_USERNAME:postgres}
db.password=${DB_PASSWORD:password}
db.url=jdbc:postgresql://${db.host}:${db.port}/${db.name}
db.driverClassName=org.postgresql.Driver

# H2 Database Configuration (for local development and CloudHub)
db.h2.url=${H2_DB_URL:jdbc:h2:mem:asset_allocation_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
db.h2.username=${H2_DB_USERNAME:sa}
db.h2.password=${H2_DB_PASSWORD:}
db.h2.driverClassName=org.h2.Driver

# HTTP Configuration (Local/Docker)
http.host=${HTTP_HOST:0.0.0.0}
http.port=${HTTP_PORT:8083}

# HTTPS Configuration (CloudHub)
https.host=${HTTPS_HOST:0.0.0.0}
https.port=${HTTPS_PORT:8443}

# Environment Configuration
environment=${ENVIRONMENT:local}
deployment.mode=${DEPLOYMENT_MODE:standalone}

# Application Configuration
app.name=Assets Allocation MCP Server
app.version=1.0.0

# CloudHub Configuration
cloudhub.environment=${CLOUDHUB_ENVIRONMENT:dev}
cloudhub.region=${CLOUDHUB_REGION:us-east-1}

# Security Configuration
enable.cors=${ENABLE_CORS:true}
allowed.origins=${ALLOWED_ORIGINS:*}

# Logging Configuration
log.level=${LOG_LEVEL:INFO}
